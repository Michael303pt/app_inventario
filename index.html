<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Inventário</title>


<style>

body{

    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:30px;

}


.container{

    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);

}


h1{

    text-align:center;
    color:#333;

}


input{

    padding:10px;
    margin:5px;

}


button{

    padding:10px 15px;
    background:#007BFF;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;

}


button:hover{

    background:#0056b3;

}



table{

    width:100%;
    margin-top:20px;
    border-collapse:collapse;

}



table, th, td{

    border:1px solid #ccc;

}



th, td{

    padding:10px;
    text-align:center;

}



th{

    background:#007BFF;
    color:white;

}



.remover{

    background:red;

}



.remover:hover{

    background:darkred;

}


</style>


</head>


<body>


<div class="container">


<h1>Sistema de Inventário</h1>



<input 
type="text" 
id="produto" 
placeholder="Produto">



<input 
type="number" 
id="quantidade" 
placeholder="Quantidade">



<input 
type="number" 
id="preco" 
placeholder="Preço (€)">



<button onclick="adicionar()">

Adicionar

</button>




<table>


<thead>

<tr>

<th>Produto</th>

<th>Quantidade</th>

<th>Preço</th>

<th>Total</th>

<th>Ação</th>

</tr>


</thead>



<tbody id="tabela">


</tbody>



</table>



<h2>

Total do Inventário: € 

<span id="total">

0.00

</span>


</h2>



</div>





<script>


let inventario = [];





// Buscar produtos existentes no Neon

async function carregarProdutos(){


    const resposta = await fetch("/api/produtos");


    inventario = await resposta.json();


    mostrar();


}






// Adicionar produto

async function adicionar(){


    let produto =
    document.getElementById("produto").value;


    let quantidade =
    parseInt(document.getElementById("quantidade").value);


    let preco =
    parseFloat(document.getElementById("preco").value);




    if(
        produto === "" ||
        isNaN(quantidade) ||
        isNaN(preco)
    ){

        alert("Preencha todos os campos.");

        return;

    }





    await fetch("/api/produtos",{


        method:"POST",


        headers:{

            "Content-Type":"application/json"

        },


        body:JSON.stringify({

            produto:produto,

            quantidade:quantidade,

            preco:preco

        })


    });





    document.getElementById("produto").value="";
    document.getElementById("quantidade").value="";
    document.getElementById("preco").value="";



    carregarProdutos();


}







// Remover produto

async function remover(index){


    let id = inventario[index].id;



    await fetch(

        "/api/produtos/"+id,

        {

            method:"DELETE"

        }

    );



    carregarProdutos();


}







// Mostrar tabela

function mostrar(){


    let tabela =
    document.getElementById("tabela");



    tabela.innerHTML="";



    let total = 0;





    inventario.forEach((item,index)=>{


        let subtotal =
        item.quantidade * Number(item.preco);



        total += subtotal;





        tabela.innerHTML += `

        <tr>


        <td>

        ${item.produto}

        </td>



        <td>

        ${item.quantidade}

        </td>



        <td>

        € ${Number(item.preco).toFixed(2)}

        </td>



        <td>

        € ${subtotal.toFixed(2)}

        </td>



        <td>


        <button 
        class="remover"
        onclick="remover(${index})">

        Remover

        </button>


        </td>


        </tr>

        `;



    });





    document.getElementById("total").innerText =
    total.toFixed(2);



}





// Carrega automaticamente ao abrir

carregarProdutos();



</script>



</body>

</html>
