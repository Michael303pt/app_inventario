<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">

<title>Login</title>

<style>

body{

font-family:Arial;
background:#f2f2f2;

}

.login{

width:350px;

margin:100px auto;

background:white;

padding:30px;

border-radius:10px;

box-shadow:0 0 10px #999;

}

input{

width:100%;

padding:12px;

margin:10px 0;

}

button{

width:100%;

padding:12px;

background:#007BFF;

color:white;

border:none;

cursor:pointer;

}

</style>

</head>

<body>

<div class="login">

<h2>Login</h2>

<input id="email" placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="login()">

Entrar

</button>

</div>

<script>

async function login(){

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

const resposta=await fetch("/api/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email,
password

})

});

const dados=await resposta.json();

if(resposta.ok){

localStorage.setItem(
"token",
dados.token
);

window.location="index.html";

}else{

alert(dados.erro);

}

}

</script>

</body>
</html>
