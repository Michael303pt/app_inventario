<!DOCTYPE html>
<html lang="pt">
    <head> 
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sistema de Inventário</title>
        <link rel="stylesheet" href="index.css">
        <script src="index.js"></script>
    </head>
    <body>
        <div class="container">
            <button class="sair" onclick="logout()">Sair</button>
            <button class="logs" onclick="logs()">Logs</button>
            <button class="sair conta" id="btnConta" style="display:none" onclick="irParaConta()">Informações da Conta</button>

            <h1>Sistema de Inventário</h1>
            <input type="text" id="produto" placeholder="Produto">
            <input type="number" id="quantidade" placeholder="Quantidade">
            <input type="number" id="preco" placeholder="Preço (€)">
            <input type="text" id="sku" placeholder="SKU">
            <button onclick="adicionar()">Adicionar</button>

            <table>
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Quantidade</th>
                        <th>Preço</th>
                        <th>SKU</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela">
                </tbody>
            </table>
        </div>

        <div class="popup-overlay" id="popupOverlay">
            <div class="popup">
                <h2>Alterar Quantidade</h2>
                <p class="popup-produto" id="popupProduto"></p>

                <div class="popup-controls">
                    <button class="popup-btn" onclick="alterarQuantidade(-1)">-</button>
                    <input type="number" id="popupQuantidade" min="0">
                    <button class="popup-btn" onclick="alterarQuantidade(1)">+</button>
                </div>

                <div class="popup-acoes">
                    <button class="cancelar" onclick="fecharPopup()">Cancelar</button>
                    <button onclick="guardarQuantidade()">Guardar</button>
                </div>
            </div>
        </div>
    </body>
</html>
